<!DOCTYPE html >
<html lang="en">
<link rel="stylesheet" href="styles/home.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Print Estimator</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
    <script src="script/map.js" defer ></script>
</head>
<body>
    <div className="Home">
        <header className="Home-header">
            <div id="overlay" onClick={overlayOff} >
                <div>Difficulty:</div>
                <div id="difficulty-box" >
                    <Link to="/game" id="easy" className="column">Easy</Link>
                    <Link to="/game" id="medium" className="column">Medium</Link>
                    <Link to="/game" id="hard" className="column">Hard</Link>
                </div>
            </div>
            <h1 id="page-title" >
                GEOGUESSR
            </h1>
        </header>

        <button onClick={startButton} id="start-button" >START</button>
        
        <div id="street-view"></div>
        <div id="map"></div>
        <div>Latitude: <div id="lat"></div></div>
        <div>Longitude: <div id="long"></div></div>
    </div>
</body>

</html>

<script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCPHDPxo1GLqPj_HpZFagVMZ1jnEAZttkY&callback=initialize&v=weekly"
    defer
></script>
